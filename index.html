<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yılan Oyunu - Pro Edition</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --grid-color: #161b22;
            --snake-color: #00ff88;
            --snake-head: #00ffaa;
            --food-color: #ff3366;
            --text-color: #ffffff;
            --glow-color: rgba(0, 255, 136, 0.5);
        }

        body {
            background-color: #070a0e;
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            user-select: none;
        }

        h1 {
            margin: 5px 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--snake-color);
            color: var(--snake-color);
        }

        #score-board {
            display: flex;
            gap: 20px;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: bold;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #game-container {
            position: relative;
            background-color: var(--bg-color);
            border: 3px solid var(--snake-color);
            border-radius: 10px;
            box-shadow: 0 0 20px var(--glow-color);
            overflow: hidden;
        }

        canvas {
            display: block;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Mobil Kontrol Butonları */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            background: #21262d;
            border: 2px solid #30363d;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }

        .btn:active {
            transform: scale(0.92);
            background: var(--snake-color);
            color: #000;
            box-shadow: 0 0 15px var(--snake-color);
        }

        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }

        /* Mağaza Bölümü */
        #shop-container {
            margin-top: 20px;
            width: 100%;
            max-width: 360px;
            background: #161b22;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #30363d;
        }

        .shop-title {
            text-align: center;
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #8b949e;
            text-transform: uppercase;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            margin-bottom: 6px;
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #30363d;
        }

        .shop-item button {
            background: #238636;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .shop-item button.equipped {
            background: #1f6feb;
        }

        .shop-item button.locked {
            background: #8b949e;
        }

        #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 10, 14, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 7px;
            backdrop-filter: blur(5px);
        }

        #game-over-screen h2 {
            color: #ff3366;
            font-size: 32px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 10px rgba(255,51,102,0.6);
        }

        #restart-btn {
            background: var(--snake-color);
            color: black;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 15px;
            box-shadow: 0 0 10px var(--snake-color);
        }
    </style>
</head>
<body>

    <h1>YILAN KOMBAT</h1>

    <div id="score-board">
        <div>Skor: <span id="current-score">0</span></div>
        <div>En Yüksek: <span id="high-score">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="360" height="360"></canvas>
        
        <div id="game-over-screen">
            <h2>KAYBETTİN!</h2>
            <p id="final-score-text">Skorun: 0</p>
            <button id="restart-btn" onclick="resetGame()">Tekrar Dene</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn" id="up">▲</div>
        <div class="btn" id="left">◀</div>
        <div class="btn" id="right">▶</div>
        <div class="btn" id="down">▼</div>
    </div>

    <div id="shop-container">
        <div class="shop-title">🛒 TEMA MAĞAZASI</div>
        <div class="shop-item">
            <span>🟢 Karanlık Neon</span>
            <button id="skin-1" class="equipped" onclick="selectSkin(1)">Seçili</button>
        </div>
        <div class="shop-item">
            <span>🌸 Cyberpunk Pembe (10 Puan)</span>
            <button id="skin-2" class="locked" onclick="buyOrSelectSkin(2, 10)">Kilitle</button>
        </div>
        <div class="shop-item">
            <span>🥊 Chimaev Modu (25 Puan)</span>
            <button id="skin-3" class="locked" onclick="buyOrSelectSkin(3, 25)">Kilitle</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 9, y: 9}];
        let direction = {x: 0, y: 0};
        let food = {x: 5, y: 5, isGold: false};
        
        let score = 0;
        let highScore = localStorage.getItem("highScore") || 0;
        document.getElementById("high-score").innerText = highScore;

        let gameSpeed = 130;
        let gameInterval;
        let isGameOver = false;

        // Animasyon Değişkenleri
        let animationPulse = 0;
        let pulseDirection = 1;

        // Mağaza Değişkenleri
        let unlockedSkins = JSON.parse(localStorage.getItem("unlockedSkins")) || [1];
        let activeSkin = localStorage.getItem("activeSkin") || 1;

        const themes = {
            1: { bg: '#0d1117', grid: '#161b22', snake: '#00ff88', head: '#00ffaa', food: '#ff3366', glow: 'rgba(0, 255, 136, 0.5)' },
            2: { bg: '#1a0f1a', grid: '#2d142c', snake: '#ff007f', head: '#ff77ff', food: '#00ffff', glow: 'rgba(255, 0, 127, 0.5)' },
            3: { bg: '#1f1300', grid: '#3a2200', snake: '#ff9900', head: '#ffffff', food: '#ff3333', glow: 'rgba(255, 153, 0, 0.5)' }
        };

        function updateThemeStyles() {
            const currentTheme = themes[activeSkin];
            document.documentElement.style.setProperty('--bg-color', currentTheme.bg);
            document.documentElement.style.setProperty('--grid-color', currentTheme.grid);
            document.documentElement.style.setProperty('--snake-color', currentTheme.snake);
            document.documentElement.style.setProperty('--snake-head', currentTheme.head);
            document.documentElement.style.setProperty('--food-color', currentTheme.food);
            document.documentElement.style.setProperty('--glow-color', currentTheme.glow);
            document.getElementById("game-container").style.borderColor = currentTheme.snake;
            document.getElementById("game-container").style.boxShadow = `0 0 20px ${currentTheme.glow}`;
        }

        // Oyun Döngüsü
        function mainGameLoop() {
            if (isGameOver) return;
            
            // Animasyon puls değerini güncelle (yemlerin parlaması için)
            animationPulse += 0.1 * pulseDirection;
            if (animationPulse > 3 || animationPulse < 0) pulseDirection *= -1;

            moveSnake();
            if (checkCollision()) {
                endGame();
                return;
            }
            checkFoodEat();
            drawGame();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Yemi Çiz (Hafif büyüyüp küçülme animasyonlu)
            ctx.shadowBlur = 10 + animationPulse;
            ctx.shadowColor = food.isGold ? "#ffd700" : themes[activeSkin].food;
            ctx.fillStyle = food.isGold ? "#ffd700" : themes[activeSkin].food;
            
            ctx.beginPath();
            let radius = (gridSize / 2) - 2 + (animationPulse * 0.5);
            if (radius < 2) radius = 2;
            ctx.arc((food.x * gridSize) + gridSize/2, (food.y * gridSize) + gridSize/2, radius, 0, Math.PI * 2);
            ctx.fill();

            // 2. Yılanı Çiz (Modern yuvarlatılmış neon tasarım)
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.shadowBlur = isHead ? 15 : 8;
                ctx.shadowColor = isHead ? themes[activeSkin].head : themes[activeSkin].snake;
                ctx.fillStyle = isHead ? themes[activeSkin].head : themes[activeSkin].snake;

                // Yumuşak köşeli kare çizimi
                ctx.beginPath();
                let size = gridSize - 2;
                let offset = 1;
                
                // Kuyruğa doğru hafifçe küçülme animasyonu
                if(!isHead) {
                    size -= Math.min(index * 0.3, 4);
                    offset += Math.min(index * 0.15, 2);
                }

                ctx.roundRect((part.x * gridSize) + offset, (part.y * gridSize) + offset, size, size, isHead ? 8 : 5);
                ctx.fill();
            });
            
            ctx.shadowBlur = 0; // Gölgeyi sıfırla
        }

        function moveSnake() {
            if (direction.x === 0 && direction.y === 0) return;
            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};
            snake.unshift(head);
            snake.pop();
        }

        function checkCollision() {
            const head = snake[0];
            // Duvarlar
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
            // Kendi vücudu
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }

        function checkFoodEat() {
            const head = snake[0];
            if (head.x === food.x && head.y === food.y) {
                // Puanı ekle
                score += food.isGold ? 3 : 1;
                document.getElementById("current-score").innerText = score;
                
                // Yılanı uzat
                snake.push({...snake[snake.length - 1]});
                
                // Oyunu hızlandır (Maksimum hıza kadar)
                if (gameSpeed > 60) {
                    gameSpeed -= 3;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(mainGameLoop, gameSpeed);
                }

                generateFood();
                updateShopButtons();
            }
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // %15 ihtimalle Altın Yem çıksın
            food.isGold = Math.random() < 0.15;

            // Yılanın üstünde çıkmasın
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                    break;
                }
            }
        }

        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("highScore", highScore);
                document.getElementById("high-score").innerText = highScore;
            }
            document.getElementById("final-score-text").innerText = `Skorun: ${score}`;
            document.getElementById("game-over-screen").style.display = "flex";
        }

        function resetGame() {
            snake = [{x: 9, y: 9}];
            direction = {x: 0, y: 0};
            score = 0;
            gameSpeed = 130;
            isGameOver = false;
            document.getElementById("current-score").innerText = score;
            document.getElementById("game-over-screen").style.display = "none";
            generateFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(mainGameLoop, gameSpeed);
        }

        // Mağaza Sistemleri
        function buyOrSelectSkin(id, cost) {
            if (unlockedSkins.includes(id)) {
                selectSkin(id);
            } else {
                // En yüksek skora göre satın alma kontrolü
                if (highScore >= cost) {
                    unlockedSkins.push(id);
                    localStorage.setItem("unlockedSkins", JSON.stringify(unlockedSkins));
                    selectSkin(id);
                } else {
                    alert(`Bu temayı açmak için en yüksek skorunun en az ${cost} olması lazım kral! Biraz daha oyna.`);
                }
            }
        }

        function selectSkin(id) {
            if (!unlockedSkins.includes(id)) return;
            activeSkin = id;
            localStorage.setItem("activeSkin", activeSkin);
            updateThemeStyles();
            updateShopButtons();
            drawGame();
        }

        function updateShopButtons() {
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`skin-${i}`);
                if (!btn) continue;

                if (activeSkin == i) {
                    btn.innerText = "Seçili";
                    btn.className = "equipped";
                } else if (unlockedSkins.includes(i)) {
                    btn.innerText = "Seç";
                    btn.className = "";
                } else {
                    btn.innerText = "Kilidi Aç";
                    btn.className = "locked";
                }
            }
        }

        // Kontroller
        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp": if (direction.y === 0) direction = {x: 0, y: -1}; break;
                case "ArrowDown": if (direction.y === 0) direction = {x: 0, y: 1}; break;
                case "ArrowLeft": if (direction.x === 0) direction = {x: -1, y: 0}; break;
                case "ArrowRight": if (direction.x === 0) direction = {x: 1, y: 0}; break;
            }
        });

        // Mobil Buton Atamaları
        document.getElementById("up").addEventListener("click", () => { if (direction.y === 0) direction = {x: 0, y: -1}; });
        document.getElementById("down").addEventListener("click", () => { if (direction.y === 0) direction = {x: 0, y: 1}; });
        document.getElementById("left").addEventListener("click", () => { if (direction.x === 0) direction = {x: -1, y: 0}; });
        document.getElementById("right").addEventListener("click", () => { if (direction.x === 0) direction = {x: 1, y: 0}; });

        // Başlangıç
        updateThemeStyles();
        updateShopButtons();
        generateFood();
        gameInterval = setInterval(mainGameLoop, gameSpeed);
    </script>
</body>
</html>
