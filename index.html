<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efsane Mobil Yılan</title>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 5px; 
            touch-action: none;
            user-select: none;
        }
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85vh;
        }
        .active { display: flex; }
        
        h1 { font-size: 36px; color: #ffeb3b; text-shadow: 0 0 15px rgba(255,235,59,0.6); margin: 10px 0; }
        h2 { font-size: 20px; color: #00e676; margin: 5px 0; }
        
        /* Butonlar */
        .menu-btn {
            background: linear-gradient(145deg, #ff9800, #f57c00);
            color: white; border: none; padding: 12px 35px; font-size: 18px;
            font-weight: bold; border-radius: 25px; margin: 8px; width: 180px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .menu-btn:active { transform: scale(0.95); }
        .back-btn { background: #444; }

        /* Yeni Üst Bar (Skor ve Güvenli Menü Butonu) */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 300px;
            margin-bottom: 8px;
        }
        .mini-menu-btn {
            background: #e53935;
            color: white; border: none; padding: 5px 12px; font-size: 12px;
            font-weight: bold; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .mini-menu-btn:active { transform: scale(0.9); }
        #score-board { font-size: 16px; font-weight: bold; color: #fff; text-align: right; flex-grow: 1; }

        /* Oyun Konteyneri ve Dans Eden Adam */
        .game-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            border: 4px solid #ff9800; 
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0,0,0,0.9); 
        }
        .bg-dance {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3N6ZndndXp0M3R5Nms4bXN5OHV5N3N1amN0bXp6ZndndXp0M3R5JmNoPTYwMCZjbD10JnB0PTE/l3V0lsG3WZ1u4GeVG/giphy.gif');
            background-size: cover;
            background-position: center;
            opacity: 0.45; 
            z-index: 1;
        }
        canvas { 
            position: absolute; top: 0; left: 0;
            background-color: transparent; 
            z-index: 2;
        }
        
        /* Gelişmiş Mağaza */
        .shop-container { 
            display: flex; flex-direction: column; gap: 12px; 
            max-height: 50vh; overflow-y: auto; padding: 10px; width: 90%;
        }
        .shop-section { background: #222; padding: 12px; border-radius: 12px; border: 1px solid #333; }
        .shop-options { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 8px; }
        .item-box {
            width: 50px; height: 50px; background: #333; border: 2px solid #555;
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold; color: white;
        }
        .item-box.selected { border-color: #00e676; background: #1b5e20; box-shadow: 0 0 10px #00e676; }

        /* GENİŞLETİLMİŞ VE RAHATLATILMIŞ D-PAD CONTROL */
        .controls { 
            display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; 
            gap: 12px; justify-content: center; margin-top: 25px; 
        }
        .btn { 
            background-color: #222; color: white; border: 2px solid #444; border-radius: 50%; 
            font-size: 28px; font-weight: bold; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 8px rgba(0,0,0,0.5);
        }
        .btn:active { background-color: #444; transform: scale(0.9); }
        #up { grid-column: 2; grid-row: 1; }
        #left { grid-column: 1; grid-row: 2; }
        #right { grid-column: 3; grid-row: 2; }
        #down { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active">
        <h1>YILAN X</h1>
        <h2>DANS MODU ACTIVE 🔥</h2>
        <button class="menu-btn" onclick="changeScreen('game-screen'); startGame();">OYNA</button>
        <button class="menu-btn" onclick="changeScreen('shop-screen')">MAĞAZA</button>
    </div>

    <div id="shop-screen" class="screen">
        <h1>YILAN MAĞAZASI</h1>
        <div class="shop-container">
            <div class="shop-section">
                <div>Yılan Rengi (Takım & Neon Renkleri)</div>
                <div class="shop-options">
                    <div class="item-box selected" id="c1" onclick="selectColor('lime', 'c1')" style="background-color: lime;"></div>
                    <div class="item-box" id="c2" onclick="selectColor('#00bcd4', 'c2')" style="background-color: #00bcd4;"></div>
                    <div class="item-box" id="c3" onclick="selectColor('#e91e63', 'c3')" style="background-color: #e91e63;"></div>
                    <div class="item-box" id="c4" onclick="selectColor('#ffeb3b', 'c4')" style="background-color: #ffeb3b;"></div>
                    <div class="item-box" id="c5" onclick="selectColor('#ff3d00', 'c5')" style="background-color: #ff3d00;"></div>
                    <div class="item-box" id="c6" onclick="selectColor('#9c27b0', 'c6')" style="background-color: #9c27b0;"></div>
                </div>
            </div>
            <div class="shop-section">
                <div>Yılan Tarzı & Yüzü</div>
                <div class="shop-options">
                    <div class="item-box selected" id="f1" onclick="selectFace('normal', 'f1')">👀</div>
                    <div class="item-box" id="f2" onclick="selectFace('gozluk', 'f2')">🕶️</div>
                    <div class="item-box" id="f3" onclick="selectFace('sinirli', 'f3')">😠</div>
                    <div class="item-box" id="f4" onclick="selectFace('zombi', 'f4')">🧟</div>
                    <div class="item-box" id="f5" onclick="selectFace('korsan', 'f5')">🏴‍☠️</div>
                    <div class="item-box" id="f6" onclick="selectFace('kral', 'f6')">👑</div>
                </div>
            </div>
        </div>
        <button class="menu-btn back-btn" onclick="changeScreen('main-menu')">GERİ</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="top-bar">
            <button class="mini-menu-btn" onclick="backToMenu()">↩ MENÜ</button>
            <div id="score-board">Skor: <span id="score">0</span> | En Yüksek: <span id="highscore">0</span></div>
        </div>
        
        <div class="game-container">
            <div class="bg-dance"></div>
            <canvas id="gameCanvas" width="300" height="300"></canvas>
        </div>

        <div class="controls">
            <div class="btn" id="up">↑</div>
            <div class="btn" id="left">←</div>
            <div class="btn" id="right">→</div>
            <div class="btn" id="down">↓</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // BÜYÜTÜLMÜŞ YILAN BOYUTU (Eski: 15, Yeni: 20)
        let gridSize = 20; 
        let gameInterval;
        let gameRunning = false;
        
        let score = 0;
        let highScore = localStorage.getItem("snake_highscore") || 0;
        document.getElementById("highscore").innerText = highScore;

        let snakeColor = 'lime';
        let snakeFace = 'normal';
        
        let baseSpeed = 160; 
        let currentSpeed = baseSpeed;

        let snake = { x: 140, y: 140, dx: gridSize, dy: 0, cells: [], maxCells: 4 };
        let food = { x: 60, y: 60, isGold: false, timer: 0 };

        function changeScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function selectColor(color, id) {
            snakeColor = color;
            document.querySelectorAll('[id^="c"]').forEach(b => b.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }
        function selectFace(face, id) {
            snakeFace = face;
            document.querySelectorAll('[id^="f"]').forEach(b => b.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function spawnFood() {
            // Yeni boyuta göre haritada tam oturacak şekilde yem çıkarma
            food.x = getRandomInt(0, canvas.width / gridSize) * gridSize;
            food.y = getRandomInt(0, canvas.height / gridSize) * gridSize;
            food.isGold = Math.random() < 0.25; 
            food.timer = food.isGold ? 70 : 0;  
        }

        function startGame() {
            snake.x = 140; snake.y = 140; snake.cells = []; snake.maxCells = 4;
            snake.dx = gridSize; snake.dy = 0; score = 0; currentSpeed = baseSpeed;
            document.getElementById("score").innerText = score;
            spawnFood();
            gameRunning = true;
            resetInterval();
        }

        function resetInterval() {
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, currentSpeed);
        }

        function backToMenu() {
            gameRunning = false;
            clearInterval(gameInterval);
            changeScreen('main-menu');
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            snake.x += snake.dx; snake.y += snake.dy;

            if (snake.x < 0) snake.x = canvas.width - gridSize;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - gridSize;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({ x: snake.x, y: snake.y });
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            if (food.isGold) {
                food.timer--;
                if (food.timer <= 0) spawnFood();
            }

            // Tombul Yemi Çiz
            ctx.beginPath();
            ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2 - 1, 0, 2 * Math.PI);
            ctx.fillStyle = food.isGold ? '#ffd700' : '#ff1744';
            ctx.shadowBlur = food.isGold ? 15 : 0;
            ctx.shadowColor = food.isGold ? '#ffd700' : 'transparent';
            ctx.fill();
            ctx.shadowBlur = 0;

            // İri ve Oval Yılanı Çiz
            snake.cells.forEach(function (cell, index) {
                ctx.beginPath();
                ctx.arc(cell.x + gridSize/2, cell.y + gridSize/2, gridSize/2, 0, 2 * Math.PI);
                ctx.fillStyle = snakeColor;
                ctx.fill();

                // BÜYÜTÜLMÜŞ DETAYLI KAFASI VE YÜZLERİ
                if (index === 0) {
                    ctx.fillStyle = 'black';
                    let r = gridSize / 6; // Büyük yılan için daha dengeli göz boyutu
                    let eyeOffset1X = 0, eyeOffset1Y = 0, eyeOffset2X = 0, eyeOffset2Y = 0;
                    let decorationX = 0, decorationY = 0;

                    if (snake.dx > 0) { 
                        eyeOffset1X = gridSize*0.65; eyeOffset1Y = gridSize*0.25;
                        eyeOffset2X = gridSize*0.65; eyeOffset2Y = gridSize*0.75;
                        decorationX = gridSize*0.3; decorationY = gridSize*0.5;
                    } else if (snake.dx < 0) { 
                        eyeOffset1X = gridSize*0.35; eyeOffset1Y = gridSize*0.25;
                        eyeOffset2X = gridSize*0.35; eyeOffset2Y = gridSize*0.75;
                        decorationX = gridSize*0.7; decorationY = gridSize*0.5;
                    } else if (snake.dy > 0) { 
                        eyeOffset1X = gridSize*0.25; eyeOffset1Y = gridSize*0.65;
                        eyeOffset2X = gridSize*0.75; eyeOffset2Y = gridSize*0.65;
                        decorationX = gridSize*0.5; decorationY = gridSize*0.3;
                    } else if (snake.dy < 0) { 
                        eyeOffset1X = gridSize*0.25; eyeOffset1Y = gridSize*0.35;
                        eyeOffset2X = gridSize*0.75; eyeOffset2Y = gridSize*0.35;
                        decorationX = gridSize*0.5; decorationY = gridSize*0.7;
                    }

                    if (snakeFace === 'normal') {
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset1X, cell.y + eyeOffset1Y, r, 0, 2 * Math.PI); ctx.fill();
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset2X, cell.y + eyeOffset2Y, r, 0, 2 * Math.PI); ctx.fill();
                    } 
                    else if (snakeFace === 'gozluk') {
                        ctx.lineWidth = 3; ctx.strokeStyle = 'black'; ctx.beginPath();
                        ctx.moveTo(cell.x + eyeOffset1X, cell.y + eyeOffset1Y); ctx.lineTo(cell.x + eyeOffset2X, cell.y + eyeOffset2Y); ctx.stroke();
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset1X, cell.y + eyeOffset1Y, r*1.4, 0, 2 * Math.PI); ctx.fill();
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset2X, cell.y + eyeOffset2Y, r*1.4, 0, 2 * Math.PI); ctx.fill();
                    } 
                    else if (snakeFace === 'sinirli') {
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset1X, cell.y + eyeOffset1Y, r, 0, 2 * Math.PI); ctx.fill();
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset2X, cell.y + eyeOffset2Y, r, 0, 2 * Math.PI); ctx.fill();
                        ctx.strokeStyle = 'black'; ctx.lineWidth = 2; ctx.beginPath();
                        ctx.moveTo(cell.x + eyeOffset1X - 3, cell.y + eyeOffset1Y - 3); ctx.lineTo(cell.x + eyeOffset1X + 3, cell.y + eyeOffset1Y - 1);
                        ctx.moveTo(cell.x + eyeOffset2X - 3, cell.y + eyeOffset2Y - 1); ctx.lineTo(cell.x + eyeOffset2X + 3, cell.y + eyeOffset2Y - 3); ctx.stroke();
                    }
                    else if (snakeFace === 'zombi') {
                        ctx.fillStyle = '#76ff03'; 
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset1X, cell.y + eyeOffset1Y, r*1.3, 0, 2 * Math.PI); ctx.fill();
                        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(cell.x + eyeOffset2X, cell.y + eyeOffset2Y, r/2, 0, 2 * Math.PI); ctx.fill();
                    }
                    else if (snakeFace === 'korsan') {
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset1X, cell.y + eyeOffset1Y, r, 0, 2 * Math.PI); ctx.fill(); 
                        ctx.lineWidth = 2.5; ctx.strokeStyle = 'black'; ctx.beginPath(); 
                        ctx.moveTo(cell.x, cell.y); ctx.lineTo(cell.x + gridSize, cell.y + gridSize); ctx.stroke();
                    }
                    else if (snakeFace === 'kral') {
                        ctx.fillStyle = 'black';
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset1X, cell.y + eyeOffset1Y, r, 0, 2 * Math.PI); ctx.fill();
                        ctx.beginPath(); ctx.arc(cell.x + eyeOffset2X, cell.y + eyeOffset2Y, r, 0, 2 * Math.PI); ctx.fill();
                        ctx.fillStyle = '#ffd700'; 
                        ctx.fillRect(cell.x + decorationX - 4, cell.y + decorationY - 4, 8, 8);
                    }
                }

                if (cell.x === food.x && cell.y === food.y) {
                    snake.maxCells++;
                    score += food.isGold ? 50 : 10;
                    document.getElementById("score").innerText = score;
                    
                    if (score > highScore) {
                        highScore = score;
                        document.getElementById("highscore").innerText = highScore;
                        localStorage.setItem("snake_highscore", highScore);
                    }

                    if (currentSpeed > 60) {
                        currentSpeed -= 1.5;
                        resetInterval();
                    }
                    spawnFood();
                }

                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        startGame(); 
                    }
                }
            });
        }

        function setDirection(dir) {
            if (dir === 'up' && snake.dy === 0) { snake.dx = 0; snake.dy = -gridSize; }
            else if (dir === 'down' && snake.dy === 0) { snake.dx = 0; snake.dy = gridSize; }
            else if (dir === 'left' && snake.dx === 0) { snake.dx = -gridSize; snake.dy = 0; }
            else if (dir === 'right' && snake.dx === 0) { snake.dx = gridSize; snake.dy = 0; }
        }

        document.getElementById('up').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection('up'); });
        document.getElementById('down').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection('down'); });
        document.getElementById('left').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection('left'); });
        document.getElementById('right').addEventListener('touchstart', (e) => { e.preventDefault(); setDirection('right'); });
    </script>
</body>
</html>
