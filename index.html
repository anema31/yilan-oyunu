<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color=1.0, user-scalable=no">
    <title>Yılan Oyunu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { font-size: 18px; margin-bottom: 8px; color: #a855f7; }
        
        /* 🎮 OYUN ALANI */
        #game-board {
            width: 300px;
            height: 300px;
            background-color: #14532d; 
            border: 4px solid #1e293b;
            position: relative;
        }

        /* 📱 ANA MENÜ */
        #main-menu {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #14532d;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        #main-menu h2 { font-size: 24px; color: #a855f7; }
        .menu-stats { font-size: 13px; font-weight: bold; text-align: center; }
        .hs-color { color: #fbbf24; }
        .soup-color { color: #f97316; } 

        .menu-btn {
            width: 160px;
            background-color: #a855f7;
            color: white;
            border: none;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        /* 🛒 MAĞAZA */
        #shop-screen {
            display: none; 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1e293b;
            z-index: 25;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            gap: 10px;
        }
        .shop-item {
            width: 100%; background-color: #334155;
            padding: 8px; display: flex; align-items: center; justify-content: space-between;
            border-radius: 6px;
        }
        .shop-buy-btn { padding: 6px 12px; font-size: 11px; font-weight: bold; border: none; border-radius: 4px; color: white; }

        /* 🐍 NESNELER */
        .snake-part { width: 15px; height: 15px; position: absolute; border-radius: 50%; z-index: 2; }
        .food, .soup { width: 15px; height: 15px; position: absolute; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* 💀 ÖLÜM EKRANI */
        #game-over-screen {
            display: none; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9); z-index: 30;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* PANEL VE TUŞLAR */
        #score-display { font-size: 13px; font-weight: bold; margin-top: 8px; display: flex; gap: 15px; align-items: center; }
        #controls { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 10px; width: 200px; height: 150px; margin-top: 15px; }
        .btn { background-color: #334155; color: white; border: none; border-radius: 8px; font-size: 28px; display: flex; align-items: center; justify-content: center; }
        .btn-up { grid-area: up; } .btn-down { grid-area: down; } .btn-left { grid-area: left; } .btn-right { grid-area: right; }

        /* 🔙 OYUN İÇİ MENÜ BUTONU */
        #in-game-menu-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            visibility: hidden; /* Sadece oyun başlayınca açılacak */
        }
    </style>
</head>
<body>

    <h1>YILAN OYUNU</h1>
    
    <div id="game-board">
        <div id="main-menu">
            <h2>YILAN MENÜ</h2>
            <div class="menu-stats">
                <div class="hs-color">Rekor: <span id="menuHighScore">0</span></div>
                <div class="soup-color">Çorba: <span id="menuSoupMoney">0</span> TL</div>
            </div>
            <button class="menu-btn" onclick="startGame()">OYNA</button>
            <button class="menu-btn" onclick="openShop()">MAĞAZA</button>
            
            <div style="margin-top: 5px;">
                <select id="diffSelect" style="background:#1e293b; color:white; padding:5px; border-radius:5px;">
                    <option value="180">KOLAY</option>
                    <option value="130" selected>ORTA</option>
                    <option value="70">ZOR 🔥</option>
                </select>
            </div>
        </div>

        <div id="shop-screen">
            <h2>MAĞAZA</h2>
            <div class="soup-color">Bütçen: <span id="shopMoneyText">0</span> TL</div>
            
            <div class="shop-item">
                <span>Klasik Mor</span>
                <button class="shop-buy-btn" id="btnSkinMor" onclick="clickMor()" style="background:#a855f7;">AKTİF</button>
            </div>
            <div class="shop-item">
                <span>Mavi (15 TL)</span>
                <button class="shop-buy-btn" id="btnSkinMavi" onclick="clickMavi()" style="background:#22c55e;">AL</button>
            </div>
            <div class="shop-item">
                <span>Altın (40 TL)</span>
                <button class="shop-buy-btn" id="btnSkinAltin" onclick="clickAltin()" style="background:#22c55e;">AL</button>
            </div>
            <button class="menu-btn" onclick="closeShop()" style="background:#475569; width:100px; padding:5px; font-size:14px;">GERİ</button>
        </div>

        <div id="game-over-screen">
            <p style="color:#ef4444; font-size:20px; font-weight:bold; margin-bottom:10px;">kaybettin seni ezik😂👎</p>
            <div id="gameOverStatsDisplay" style="margin-bottom:15px; text-align:center; font-weight:bold;"></div>
            <button class="menu-btn" onclick="restartGame()">TEKRAR OYNA</button>
        </div>
    </div>

    <div id="score-display">
        <div>Skor: <span id="score">0</span></div>
        <div class="hs-color">Rekor: <span id="gameHighScore">0</span></div>
        <div class="soup-color">Çorba: <span id="gameSoupMoney">0</span> TL</div>
        <button id="in-game-menu-btn" onclick="goToMainMenu()">MENÜ</button>
    </div>

    <div id="controls">
        <button class="btn btn-up" onclick="changeDir(0, -1)">↑</button>
        <button class="btn btn-left" onclick="changeDir(-1, 0)">←</button>
        <button class="btn btn-right" onclick="changeDir(1, 0)">→</button>
        <button class="btn btn-down" onclick="changeDir(0, 1)">↓</button>
    </div>

    <script>
        var snake = [{ x: 10, y: 10 }]; 
        var food = { x: 5, y: 5 };
        var soups = []; 
        var direction = { x: 0, y: 0 }; 
        var lastDirection = { x: 0, y: 0 };
        
        var score = 0;
        var highScore = 0;
        var soupMoney = 0; 

        var currentSkin = "mor"; 
        var ownsMavi = 0; 
        var ownsAltin = 0; 

        var isDead = false;
        var gameStarted = false;
        var gameLoopId = null; 
        
        var gridSize = 20; 
        var tileSize = 15;

        // 🍪 ÇOREZ TABANLI GÜVENLİ KAYDETME FONKSİYONLARI (QuickEdit Dostu)
        function setCookie(name, value) {
            var d = new Date();
            d.setTime(d.getTime() + (365*24*60*60*1000)); // 1 Yıl sakla
            var expires = "expires="+ d.toUTCString();
            document.cookie = name + "=" + value + ";" + expires + ";path=/";
        }

        function getCookie(name) {
            var nom = name + "=";
            var decodedCookie = decodeURIComponent(document.cookie);
            var ca = decodedCookie.split(';');
            for(var i = 0; i <ca.length; i++) {
                var c = ca[i];
                while (c.charAt(0) == ' ') { c = c.substring(1); }
                if (c.indexOf(nom) == 0) { return c.substring(nom.length, c.length); }
            }
            return "";
        }

        function loadGameData() {
            var savedHighScore = getCookie("snake_highscore");
            var savedSoupMoney = getCookie("snake_soupmoney");
            var savedOwnsMavi = getCookie("snake_ownsmavi");
            var savedOwnsAltin = getCookie("snake_ownsaltin");
            var savedSkin = getCookie("snake_currentskin");

            if (savedHighScore !== "") highScore = parseInt(savedHighScore);
            if (savedSoupMoney !== "") soupMoney = parseInt(savedSoupMoney);
            if (savedOwnsMavi !== "") ownsMavi = parseInt(savedOwnsMavi);
            if (savedOwnsAltin !== "") ownsAltin = parseInt(savedOwnsAltin);
            if (savedSkin !== "") currentSkin = savedSkin;

            updateAllMoneyDisplays();
            document.getElementById("menuHighScore").innerText = highScore;
            document.getElementById("gameHighScore").innerText = highScore;
        }

        function saveGameData() {
            setCookie("snake_highscore", highScore);
            setCookie("snake_soupmoney", soupMoney);
            setCookie("snake_ownsmavi", ownsMavi);
            setCookie("snake_ownsaltin", ownsAltin);
            setCookie("snake_currentskin", currentSkin);
        }

        function updateShopUI() {
            var btnMor = document.getElementById("btnSkinMor");
            var btnMavi = document.getElementById("btnSkinMavi");
            var btnAltin = document.getElementById("btnSkinAltin");

            if (!btnMor || !btnMavi || !btnAltin) return;

            btnMor.innerText = (currentSkin === "mor") ? "AKTİF" : "SEÇ";
            btnMor.style.backgroundColor = (currentSkin === "mor") ? "#a855f7" : "#3b82f6";

            if (currentSkin === "mavi") {
                btnMavi.innerText = "AKTİF"; btnMavi.style.backgroundColor = "#a855f7";
            } else if (ownsMavi === 1) {
                btnMavi.innerText = "SEÇ"; btnMavi.style.backgroundColor = "#3b82f6";
            } else {
                btnMavi.innerText = "AL"; btnMavi.style.backgroundColor = "#22c55e";
            }

            if (currentSkin === "altin") {
                btnAltin.innerText = "AKTİF"; btnAltin.style.backgroundColor = "#a855f7";
            } else if (ownsAltin === 1) {
                btnAltin.innerText = "SEÇ"; btnAltin.style.backgroundColor = "#3b82f6";
            } else {
                btnAltin.innerText = "AL"; btnAltin.style.backgroundColor = "#22c55e";
            }
        }

        function clickMor() { currentSkin = "mor"; saveGameData(); updateShopUI(); }
        function clickMavi() {
            if (ownsMavi === 1) { currentSkin = "mavi"; } 
            else if (soupMoney >= 15) { soupMoney -= 15; ownsMavi = 1; currentSkin = "mavi"; updateAllMoneyDisplays(); } 
            else { alert("Çorba paran yetersiz! 🥣"); }
            saveGameData();
            updateShopUI();
        }
        function clickAltin() {
            if (ownsAltin === 1) { currentSkin = "altin"; } 
            else if (soupMoney >= 40) { soupMoney -= 40; ownsAltin = 1; currentSkin = "altin"; updateAllMoneyDisplays(); } 
            else { alert("Çorba paran yetersiz! 🥣"); }
            saveGameData();
            updateShopUI();
        }

        function updateAllMoneyDisplays() {
            document.getElementById("gameSoupMoney").innerText = soupMoney;
            document.getElementById("menuSoupMoney").innerText = soupMoney;
            document.getElementById("shopMoneyText").innerText = soupMoney;
        }

        function openShop() {
            document.getElementById("shopMoneyText").innerText = soupMoney;
            updateShopUI();
            document.getElementById("shop-screen").style.display = "flex";
        }
        function closeShop() { document.getElementById("shop-screen").style.display = "none"; }

        function startGame() {
            document.getElementById("main-menu").style.display = "none"; 
            document.getElementById("in-game-menu-btn").style.visibility = "visible"; // Menü butonunu göster
            gameStarted = true;
            generateNewFood();
            generateInitialSoups(); 
            draw();
            
            var chosenSpeed = parseInt(document.getElementById("diffSelect").value);
            if (gameLoopId) clearInterval(gameLoopId);
            gameLoopId = setInterval(main, chosenSpeed);
        }

        function restartGame() {
            document.getElementById("game-over-screen").style.display = "none"; 
            document.getElementById("in-game-menu-btn").style.visibility = "visible";
            snake = [{ x: 10, y: 10 }];
            direction = { x: 0, y: 0 };
            lastDirection = { x: 0, y: 0 };
            score = 0;
            document.getElementById("score").innerText = score;
            isDead = false;
            generateNewFood();
            generateInitialSoups(); 
            draw();
            
            var chosenSpeed = parseInt(document.getElementById("diffSelect").value);
            if (gameLoopId) clearInterval(gameLoopId);
            gameLoopId = setInterval(main, chosenSpeed);
        }

        // 🔙 OYUN İÇİNDEN MENÜYE DÖNME FONKSİYONU
        function goToMainMenu() {
            if (gameLoopId) clearInterval(gameLoopId); // Oyunu durdur
            gameStarted = false;
            document.getElementById("in-game-menu-btn").style.visibility = "hidden"; // Menü butonunu sakla
            document.getElementById("main-menu").style.display = "flex"; // Menüyü aç
            document.getElementById("menuHighScore").innerText = highScore;
            updateAllMoneyDisplays();
        }

        function changeDir(x, y) {
            if (!gameStarted || isDead) return;
            if (x !== 0 && lastDirection.x === 0) direction = { x: x, y: 0 };
            if (y !== 0 && lastDirection.y === 0) direction = { x: 0, y: y };
        }

        function generateInitialSoups() {
            soups = [];
            for (var i = 0; i < 3; i++) { soups.push(getSafeRandomCoord()); }
        }

        function getSafeRandomCoord() {
            var coord; var isValid = false;
            while (!isValid) {
                coord = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
                isValid = true;
                for (var i = 0; i < snake.length; i++) { if (snake[i].x === coord.x && snake[i].y === coord.y) { isValid = false; break; } }
                if (food.x === coord.x && food.y === coord.y) isValid = false;
            }
            return coord;
        }

        function main() {
            if (!gameStarted || isDead) return; 
            if (direction.x === 0 && direction.y === 0) return;

            lastDirection = direction;
            var nextHeadX = snake[0].x + direction.x;
            var nextHeadY = snake[0].y + direction.y;

            if (nextHeadX < 0 || nextHeadX >= gridSize || nextHeadY < 0 || nextHeadY >= gridSize) { triggerGameOver(); return; }
            for (var i = 0; i < snake.length; i++) { if (nextHeadX === snake[i].x && nextHeadY === snake[i].y) { triggerGameOver(); return; } }

            var newHead = { x: nextHeadX, y: nextHeadY };
            snake.unshift(newHead);

            if (nextHeadX === food.x && nextHeadY === food.y) {
                score += 10;
                document.getElementById("score").innerText = score;
                if (score > highScore) { 
                    highScore = score; 
                    document.getElementById("gameHighScore").innerText = highScore; 
                    saveGameData();
                }
                generateNewFood();
            } else {
                var soupEatenIndex = -1;
                for (var i = 0; i < soups.length; i++) { if (nextHeadX === soups[i].x && nextHeadY === soups[i].y) { soupEatenIndex = i; break; } }
                if (soupEatenIndex !== -1) {
                    soupMoney += 5; 
                    updateAllMoneyDisplays();
                    saveGameData(); // Çorba parasını kaydet
                    soups.splice(soupEatenIndex, 1);
                } else {
                    snake.pop();
                }
            }
            draw();
        }

        function generateNewFood() {
            food = { x: Math.floor(Math.random() * gridSize), y: Math.floor(Math.random() * gridSize) };
            for (var i = 0; i < snake.length; i++) { if (snake[i].x === food.x && snake[i].y === food.y) { generateNewFood(); break; } }
        }

        function triggerGameOver() {
            isDead = true;
            if (gameLoopId) clearInterval(gameLoopId); 
            document.getElementById("in-game-menu-btn").style.visibility = "hidden";
            saveGameData(); // Ölünce her ihtimale karşı verileri tekrar eşitle ve kaydet
            document.getElementById("menuHighScore").innerText = highScore;
            document.getElementById("menuSoupMoney").innerText = soupMoney; 
            document.getElementById("gameOverStatsDisplay").innerHTML = "<span class='hs-color'>Rekorun: " + highScore + "</span><br><span class='soup-color'>Çorba Paran: " + soupMoney + " TL</span>";
            document.getElementById("game-over-screen").style.display = "flex"; 
        }

        function draw() {
            var board = document.getElementById("game-board");
            var oldParts = board.querySelectorAll(".snake-part, .food, .soup");
            oldParts.forEach(function(p) { p.remove(); });
            
            var currentSnakeColor = "#a855f7";
            if (currentSkin === "mavi") currentSnakeColor = "#3b82f6";
            if (currentSkin === "altin") currentSnakeColor = "#fbbf24";

            snake.forEach(function(part) {
                var partEl = document.createElement("div");
                partEl.classList.add("snake-part");
                partEl.style.left = (part.x * tileSize) + "px";
                partEl.style.top = (part.y * tileSize) + "px";
                partEl.style.backgroundColor = currentSnakeColor; 
                board.appendChild(partEl);
            });

            var foodEl = document.createElement("div");
            foodEl.classList.add("food"); foodEl.innerText = "🍎"; 
            foodEl.style.left = (food.x * tileSize) + "px"; foodEl.style.top = (food.y * tileSize) + "px";
            board.appendChild(foodEl);

            soups.forEach(function(s) {
                var soupEl = document.createElement("div");
                soupEl.classList.add("soup"); soupEl.innerText = "🥣";
                soupEl.style.left = (s.x * tileSize) + "px"; soupEl.style.top = (s.y * tileSize) + "px";
                board.appendChild(soupEl);
            });
        }

        // Oyun açılır açılmaz eski çerez kayıtlarını yükle
        loadGameData();
    </script>
</body>
</html>
